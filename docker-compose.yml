services:
  ai-service:
    build: ./AI_service
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    volumes:
      - ./AI_service:/app
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    
    volumes:
      - ollama_data:/root/.ollama
    
    restart: unless-stopped

    # Automatic model initialization (optional)
    # Current model: tinyllama, you can change it to any model you want to use
    # Uncomment the following block to enable automatic model pulling on startup. This will pull the specified model when the container starts, ensuring it's ready for use.
    # ollama-init:
    #   image: ollama/ollama
    #   command: ["ollama", "pull", "tinyllama"]
    #   depends_on:
    #     - ollama
    #   volumes:
    #     - ollama_data:/root/.ollama
  
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongodb:
    image: mongo:4.4
    container_name: mongo-db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      -  mongodata:/data/db

  minio:
    image: minio/minio
    container_name: minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    
    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data
    
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant-db
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage



volumes:
  ollama_data:
  pgdata:
  mongodata:
  minio_data:
  qdrant_data: